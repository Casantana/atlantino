<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Split PDF Pro - Atlantino Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; }
        header { background: #fff; padding: 15px 40px; border-bottom: 1px solid #e2e8f0; }
        .screen { display: none; padding: 40px; justify-content: center; gap: 40px; }
        .split-panel { background: white; padding: 40px; border-radius: 12px; width: 420px; border: 1px solid #e2e8f0; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: 1px solid #ddd; background: #f9f9f9; flex: 1; text-align: center; }
        .tab-btn.active { background: #d63031; color: white; }
        .preview-container { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; }
        .thumb-wrapper { width: 150px; height: 180px; border: 2px solid #ddd; cursor: pointer; overflow: hidden; }
        .thumb-wrapper.selected { border-color: #27ae60; background: #eafaf1; }
        .btn-main { background: #d63031; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<header><a href="/" style="font-weight:700; color:#d63031; text-decoration:none; font-size:1.5rem;">Atlantino Tools</a></header>
<div id="screen-start" class="screen" style="display:flex;">
    <div style="text-align:center;"><h1>Split PDF pages</h1><button class="btn-main" onclick="document.getElementById('file-input').click()">Select PDF</button></div>
</div>
<div id="screen-work" class="screen">
    <div id="preview-area" class="preview-container"></div>
    <div class="split-panel">
        <div style="display:flex; margin-bottom:20px;">
            <div id="tab-range" class="tab-btn active" onclick="switchMode('range')">Range Mode</div>
            <div id="tab-pages" class="tab-btn" onclick="switchMode('pages')">Pages Mode</div>
        </div>
        <div id="panel-range"><input type="text" id="custom-range" placeholder="e.g. 1-5, 8" style="width:90%; padding:10px;"></div>
        <div id="panel-pages" style="display:none;"><button onclick="toggleExtractAll()" style="width:100%; padding:10px;">Extract All</button></div>
        <div style="margin:20px 0;"><input type="checkbox" id="merge-extracted"> <label>Merge into one PDF</label></div>
        <button class="btn-main" onclick="executeSplit()">SPLIT PDF</button>
    </div>
</div>
<input type="file" id="file-input" accept="application/pdf" style="display:none;">

<script>
    let rawFile = null; let totalPages = 0; const selected = new Set(); let mode = 'range';

    function switchMode(m) { mode = m; document.getElementById('panel-range').style.display = m==='range'?'block':'none'; document.getElementById('panel-pages').style.display = m==='pages'?'block':'none'; }
    function toggleExtractAll() { if(selected.size === totalPages) selected.clear(); else for(let i=1; i<=totalPages; i++) selected.add(i); document.querySelectorAll('.thumb-wrapper').forEach((el,i)=>el.classList.toggle('selected', selected.has(i+1))); }

    document.getElementById('file-input').onchange = async (e) => {
        rawFile = await e.target.files[0].arrayBuffer();
        document.getElementById('screen-start').style.display = 'none'; document.getElementById('screen-work').style.display = 'flex';
        const pdf = await pdfjsLib.getDocument(rawFile).promise; totalPages = pdf.numPages;
        for (let i = 1; i <= totalPages; i++) {
            const wrapper = document.createElement('div'); wrapper.className = 'thumb-wrapper';
            wrapper.innerHTML = `<canvas id="c${i}"></canvas>`; wrapper.onclick = () => { selected.has(i) ? selected.delete(i) : selected.add(i); wrapper.classList.toggle('selected'); };
            document.getElementById('preview-area').appendChild(wrapper);
            const page = await pdf.getPage(i); const vp = page.getViewport({scale:0.15}); const canvas = document.getElementById(`c${i}`);
            canvas.height = vp.height; canvas.width = vp.width; await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
        }
    };

    async function executeSplit() {
        const merge = document.getElementById('merge-extracted').checked;
        const zip = new JSZip();
        
        const getGroups = () => {
            if (mode === 'pages') return merge ? [Array.from(selected).sort((a,b)=>a-b)] : Array.from(selected).sort((a,b)=>a-b).map(p=>[p]);
            let ranges = document.getElementById('custom-range').value.split(',');
            let all = []; ranges.forEach(r => { const [s, e] = r.split('-').map(Number); for(let i=(s||0); i<=(e||s); i++) if(i>0 && i<=totalPages) all.push(i); });
            return merge ? [all] : all.map(p=>[p]);
        };

        const groups = getGroups();
        for (let i = 0; i < groups.length; i++) {
            // Se usa new Uint8Array para crear una copia fresca del buffer original en cada ciclo
            const doc = await PDFLib.PDFDocument.load(new Uint8Array(rawFile));
            const newPdf = await PDFLib.PDFDocument.create();
            const copied = await newPdf.copyPages(doc, groups[i].map(p=>p-1));
            copied.forEach(p => newPdf.addPage(p));
            const bytes = await newPdf.save();
            merge ? download(new Blob([bytes]), "output.pdf") : zip.file(`part_${i+1}.pdf`, bytes);
            if(merge) return;
        }
        if(!merge) download(await zip.generateAsync({type:"blob"}), "split.zip");
    }
    const download = (b, n) => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = n; a.click(); };
</script>
</body>
</html>
