<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Split PDF - Atlantino Tools</title>
    <script>
        if (!window.FileReader || !window.Blob || !window.Promise) {
            alert("Your browser is outdated. Please update it to use Atlantino Tools.");
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; }
        header { background: #fff; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; gap: 30px; }
        .logo { font-weight: 700; font-size: 1.4rem; color: #d63031; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #2d3436; text-decoration: none; font-size: 0.85rem; font-weight: 700; }
        .ad-space { width: 100%; height: 90px; background: #edf2f7; display: flex; align-items: center; justify-content: center; color: #a0aec0; margin-bottom: 20px; border: 1px dashed #cbd5e0; }
        .screen { display: none; height: auto; min-height: 70vh; flex-direction: column; align-items: center; padding: 40px; }
        .btn-main { background: #d63031; color: white; padding: 18px 40px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .split-panel { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .option-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <a href="https://tools.atlantino.ca" class="logo">Atlantino Tools</a>
    <nav class="nav-links">
        <a href="/merge">MERGE PDF</a>
        <a href="/split">SPLIT PDF</a>
        <a href="/compress">COMPRESS PDF</a>
    </nav>
</header>

<div class="ad-space">AdSense Banner (728x90)</div>

<div id="screen-start" class="screen" style="display: flex;">
    <h1>Split PDF pages</h1>
    <button class="btn-main" onclick="document.getElementById('file-input').click()">Select PDF file</button>
</div>

<div id="screen-work" class="screen">
    <div id="preview-area" style="margin-bottom: 20px; border: 1px solid #ccc; padding: 10px;"></div>
    <div class="split-panel">
        <h3>Choose Split Mode</h3>
        <div class="option-group">
            <label><input type="radio" name="mode" value="custom" checked> Custom Ranges (e.g. 1-5, 8-10)</label>
            <input type="text" id="custom-range" placeholder="1-5, 8-10" style="width:100%; margin-top:10px;">
        </div>
        <div class="option-group">
            <label><input type="radio" name="mode" value="fixed"> Fixed Ranges (Pages per file)</label>
            <input type="number" id="fixed-pages" value="1" min="1" style="width:60px;">
        </div>
        <div class="option-group">
            <label><input type="checkbox" id="merge-extracted"> Merge extracted pages into one PDF</label>
        </div>
        <button class="btn-main" style="width:100%" onclick="processSplit()">Split PDF</button>
    </div>
</div>

<input type="file" id="file-input" accept="application/pdf" style="display:none;">

<script>
    let loadedPdfBytes = null;

    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        loadedPdfBytes = await file.arrayBuffer();
        
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-work').style.display = 'flex';
        
        // Cargar vista previa básica con PDF.js
        const pdf = await pdfjsLib.getDocument(loadedPdfBytes).promise;
        const page = await pdf.getPage(1);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 0.5 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport }).promise;
        document.getElementById('preview-area').innerHTML = '';
        document.getElementById('preview-area').appendChild(canvas);
    });

    async function processSplit() {
        try {
            const pdfDoc = await PDFLib.PDFDocument.load(loadedPdfBytes);
            const totalPages = pdfDoc.getPageCount();
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const merge = document.getElementById('merge-extracted').checked;
            
            // Lógica simplificada de ejemplo para validación de rango
            if (mode === 'custom') {
                const range = document.getElementById('custom-range').value;
                if (!range) throw new Error("Please enter a valid range.");
                // Aquí iría la lógica de parseo de strings (e.g., 1-5, 8-10)
                alert("Split processed successfully!");
            }
            
            // Implementación de JSZip para múltiples archivos
            if (!merge) {
                const zip = new JSZip();
                // zip.file("part1.pdf", bytes);
                // zip.generateAsync({type:"blob"}).then(blob => ...);
            }
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
</script>
</body>
</html>
