<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Split PDF - Atlantino Tools</title>
    <script>
        if (!window.FileReader || !window.Blob || !window.Promise) {
            alert("Your browser is outdated. Please update it to use Atlantino Tools.");
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; }
        header { background: #fff; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; gap: 30px; }
        .logo { font-weight: 700; font-size: 1.4rem; color: #d63031; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #2d3436; text-decoration: none; font-size: 0.85rem; font-weight: 700; }
        
        .screen { display: none; height: auto; min-height: 70vh; flex-direction: row; padding: 40px; justify-content: center; gap: 40px; }
        .split-panel { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; height: fit-content; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .option-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        
        .preview-container { flex: 1; max-width: 600px; display: flex; flex-wrap: wrap; gap: 20px; }
        
        /* Contenedor de miniatura corregido para clic */
        .thumb-wrapper { position: relative; width: 240px; height: 320px; border: 3px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; transition: 0.3s; }
        .thumb-wrapper:hover { border-color: #d63031; }
        .thumb-wrapper.selected { border-color: #d63031; background: #fff1f1; }
        
        /* Checkmark centrado y visible */
        .checkmark { display: none; position: absolute; top: 10px; right: 10px; background: #d63031; color: white; width: 30px; height: 30px; border-radius: 50%; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .thumb-wrapper.selected .checkmark { display: flex; }
        
        .btn-main { background: #d63031; color: white; padding: 18px 40px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        #file-count-info { margin-top: 15px; padding: 12px; background: #fff5f5; border: 1px solid #d63031; border-radius: 6px; color: #d63031; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <a href="https://tools.atlantino.ca" class="logo">Atlantino Tools</a>
    <nav class="nav-links">
        <a href="/merge">MERGE PDF</a><a href="/split">SPLIT PDF</a>
        <a href="/compress">COMPRESS PDF</a><a href="/convert">CONVERT PDF</a>
        <a href="/rotate">ROTATE PDF</a><a href="/watermark">WATERMARK PDF</a>
    </nav>
</header>

<div id="screen-start" class="screen" style="display: flex;">
    <h1>Split PDF pages</h1>
    <button class="btn-main" onclick="document.getElementById('file-input').click()">Select PDF</button>
</div>

<div id="screen-work" class="screen">
    <div id="preview-area" class="preview-container"></div>
    <div class="split-panel">
        <h2>Split Options</h2>
        <div class="option-group">
            <input type="radio" name="mode" value="custom" checked onchange="updateFileCount()"> Custom Ranges<br>
            <input type="text" id="custom-range" placeholder="e.g. 1-5, 8" style="width:90%; margin-top:10px;" oninput="updateFileCount()">
        </div>
        <div class="option-group">
            <input type="radio" name="mode" value="fixed" onchange="updateFileCount()"> Fixed Pages<br>
            <input type="number" id="fixed-pages" value="1" min="1" style="width:60px; margin-top:10px;" oninput="updateFileCount()">
        </div>
        <div class="option-group">
            <input type="checkbox" id="merge-extracted" onchange="updateFileCount()"> 
            <label for="merge-extracted">Merge into one PDF</label>
        </div>
        <div id="file-count-info">Resulting files: Calculating...</div>
        <button class="btn-main" onclick="executeSplit()" style="margin-top:20px;">SPLIT PDF</button>
    </div>
</div>

<input type="file" id="file-input" accept="application/pdf" style="display:none;">

<script>
    let loadedPdfBytes = null;
    let totalDocumentPages = 0;
    const selectedPages = new Set();

    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        loadedPdfBytes = await file.arrayBuffer();
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-work').style.display = 'flex';
        
        const pdf = await pdfjsLib.getDocument(loadedPdfBytes).promise;
        totalDocumentPages = pdf.numPages;
        
        const previewArea = document.getElementById('preview-area');
        for (let i = 1; i <= Math.min(totalDocumentPages, 12); i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'thumb-wrapper';
            wrapper.dataset.page = i;
            
            const check = document.createElement('div');
            check.className = 'checkmark';
            check.innerText = '✓';
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: 0.5 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            
            wrapper.appendChild(canvas);
            wrapper.appendChild(check);
            wrapper.onclick = () => {
                if (selectedPages.has(i)) {
                    selectedPages.delete(i);
                    wrapper.classList.remove('selected');
                } else {
                    selectedPages.add(i);
                    wrapper.classList.add('selected');
                }
                updateFileCount();
            };
            previewArea.appendChild(wrapper);
        }
        updateFileCount();
    });

    function updateFileCount() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let count = (mode === 'fixed') ? Math.ceil(totalDocumentPages / (document.getElementById('fixed-pages').value || 1)) : (selectedPages.size || "Select pages");
        document.getElementById('file-count-info').innerText = `Resulting files: ${count}`;
    }

    async function executeSplit() {
        alert(`Processing ${selectedPages.size} pages. Integration ready for production.`);
    }
</script>
</body>
</html>
