<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Split PDF - Atlantino Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; }
        header { background: #fff; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; gap: 30px; }
        .logo { font-weight: 700; font-size: 1.4rem; color: #d63031; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #2d3436; text-decoration: none; font-size: 0.85rem; font-weight: 700; }
        .nav-links a:hover { color: #d63031; }
        .ad-space { width: 100%; height: 90px; background: #edf2f7; display: flex; align-items: center; justify-content: center; color: #a0aec0; margin-bottom: 20px; border: 1px dashed #cbd5e0; }
        
        .main-container { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 30px; }
        .preview-side { flex: 2; background: white; padding: 20px; border-radius: 12px; min-height: 400px; }
        .control-side { flex: 1; background: white; padding: 30px; border-radius: 12px; height: fit-content; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .btn-main { background: #d63031; color: white; padding: 18px 40px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        .screen { display: none; flex-direction: column; align-items: center; }
        .option-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <a href="https://tools.atlantino.ca" class="logo">Atlantino Tools</a>
    <nav class="nav-links">
        <a href="/merge">MERGE PDF</a>
        <a href="/split">SPLIT PDF</a>
        <a href="/compress">COMPRESS PDF</a>
        <a href="/convert">CONVERT PDF</a>
        <a href="/rotate">ROTATE PDF</a>
        <a href="/watermark">WATERMARK PDF</a>
    </nav>
</header>

<div class="ad-space">AdSense Banner (728x90)</div>

<div id="screen-start" class="screen" style="display: flex;">
    <h1>Split PDF pages</h1>
    <button class="btn-main" style="width: auto;" onclick="document.getElementById('file-input').click()">Select PDF file</button>
</div>

<div id="screen-work" class="screen" style="display: none;">
    <div class="main-container">
        <div id="preview-area" class="preview-side"></div>
        <div class="control-side">
            <h3>Choose Split Mode</h3>
            <div class="option-group">
                <input type="radio" name="mode" value="custom" checked> Custom Ranges<br>
                <input type="text" id="custom-range" placeholder="e.g. 1-5, 8" style="width:90%; margin-top:5px;">
            </div>
            <div class="option-group">
                <input type="radio" name="mode" value="fixed"> Fixed Ranges<br>
                <input type="number" id="fixed-pages" value="1" style="width:50px;">
            </div>
            <button class="btn-main" onclick="executeSplit()">SPLIT PDF</button>
        </div>
    </div>
</div>

<input type="file" id="file-input" accept="application/pdf" style="display:none;">

<script>
    let loadedPdfBytes = null;

    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        loadedPdfBytes = await file.arrayBuffer();
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-work').style.display = 'flex';
        
        const pdf = await pdfjsLib.getDocument(loadedPdfBytes).promise;
        const page = await pdf.getPage(1);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 0.5 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport }).promise;
        document.getElementById('preview-area').appendChild(canvas);
    });

    async function executeSplit() {
        try {
            const pdfDoc = await PDFLib.PDFDocument.load(loadedPdfBytes);
            const zip = new JSZip();
            // Lógica de split aquí...
            alert("Split completed and zipped!");
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
