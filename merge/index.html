<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merge PDF - Atlantino Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding: 40px; }
        .main-wrapper { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; }
        
        /* Área izquierda: Miniaturas */
        .left-panel { flex: 3; background: white; padding: 20px; border-radius: 8px; min-height: 400px; }
        #file-list { display: flex; flex-wrap: wrap; gap: 15px; }
        .file-item { width: 120px; height: 150px; background: #eee; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; cursor: grab; }
        .file-item button { position: absolute; top: 0; right: 0; background: red; color: white; border: none; cursor: pointer; }

        /* Área derecha: Panel de acción */
        .right-panel { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        .btn-merge { width: 100%; padding: 15px; background: #d63031; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-panel">
        <input type="file" id="file-input" multiple accept="application/pdf" style="display:none;">
        <div id="file-list">
            <div id="upload-zone" style="width: 100%; text-align: center; padding: 50px;" onclick="document.getElementById('file-input').click()">
                <button class="btn-merge" style="width: auto;">Select PDF files</button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <h2>Merge PDF</h2>
        <p>To change the order of your PDFs, drag and drop the files as you want.</p>
        <button id="merge-btn" class="btn-merge" style="display:none;" onclick="mergeFiles()">Merge PDF</button>
    </div>
</div>

<script>
    const fileList = document.getElementById('file-list');
    new Sortable(fileList, { animation: 150 });

    document.getElementById('file-input').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${file.name.slice(0,8)}</span><button onclick="this.parentElement.remove()">×</button>`;
            fileList.appendChild(div);
        });
        document.getElementById('merge-btn').style.display = 'block';
        document.getElementById('upload-zone').style.display = 'none';
    });
</script>
</body>
</html>
