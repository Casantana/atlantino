<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merge PDF - Atlantino Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.css"/>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; padding: 40px; color: #2d3436; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        
        /* Botón Rojo Principal */
        .btn-main { background: #d63031; color: white; padding: 18px 45px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3); }
        
        /* Área de archivos */
        #file-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        .file-item { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; cursor: grab; }
        .file-item button { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Merge PDF files</h1>
    
    <input type="file" id="file-input" multiple accept="application/pdf" style="display:none;">
    <button class="btn-main" onclick="document.getElementById('file-input').click()">Select PDF files</button>
    <p>or drop PDFs here</p>

    <div id="file-list"></div>
    <button id="merge-btn" class="btn-main" style="display:none; margin-top:30px;" onclick="mergeFiles()">Merge PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
    let filesArray = [];
    const fileList = document.getElementById('file-list');

    // Habilitar reordenamiento
    new Sortable(fileList, { animation: 150 });

    document.getElementById('file-input').addEventListener('change', function(e) {
        Array.from(e.target.files).forEach(file => {
            filesArray.push(file);
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${file.name.substring(0,10)}...</span><button onclick="this.parentElement.remove()">×</button>`;
            fileList.appendChild(div);
        });
        document.getElementById('merge-btn').style.display = 'inline-block';
    });

    async function mergeFiles() {
        // Lógica de PDFLib para unir filesArray en el orden actual del DOM
        alert("Procesando archivos...");
    }
</script>
</body>
</html>
