<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merge PDF - Atlantino Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; }
        /* Pantalla 1: Inicio */
        #screen-start { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        /* Pantalla 2: Trabajo */
        #screen-work { display: none; padding: 40px; display: flex; gap: 30px; max-width: 1100px; margin: 0 auto; }
        
        .btn-main { background: #d63031; color: white; padding: 20px 50px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3); }
        
        .left-panel { flex: 3; background: white; padding: 20px; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 15px; }
        .file-item { width: 120px; height: 160px; border: 1px solid #ddd; border-radius: 4px; position: relative; }
        .add-more { width: 120px; height: 160px; border: 2px dashed #d63031; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #d63031; }
        
        .right-panel { flex: 1; background: #eaf4ff; padding: 25px; border-radius: 8px; border: 1px solid #cce5ff; text-align: center; }
    </style>
</head>
<body>

<div id="screen-start">
    <h1>Merge PDF files</h1>
    <p>Combine PDFs in the order you want.</p>
    <button class="btn-main" onclick="document.getElementById('file-input').click()">Select PDF files</button>
</div>

<div id="screen-work">
    <div class="left-panel" id="file-list">
        <div class="add-more" onclick="document.getElementById('file-input').click()">+ Add</div>
    </div>
    <div class="right-panel">
        <h2>Merge PDF</h2>
        <button class="btn-main" style="width:100%" onclick="mergeFiles()">Merge PDF</button>
    </div>
</div>

<input type="file" id="file-input" multiple accept="application/pdf" style="display:none;">

<script>
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const screenStart = document.getElementById('screen-start');
    const screenWork = document.getElementById('screen-work');

    fileInput.addEventListener('change', async function(e) {
        screenStart.style.display = 'none';
        screenWork.style.display = 'flex';
        
        for (const file of e.target.files) {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<canvas></canvas><button onclick="this.parentElement.remove()" style="position:absolute; top:0; right:0;">×</button>`;
            fileList.appendChild(div);
            
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            const page = await pdf.getPage(1);
            const canvas = div.querySelector('canvas');
            const context = canvas.getContext('2d');
            const viewport = page.getViewport({ scale: 0.15 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: context, viewport }).promise;
        }
    });
    new Sortable(fileList, { animation: 150 });
</script>
</body>
</html>
